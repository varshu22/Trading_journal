<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trade Log — Daily Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #080b18;
    color: #c8cce8;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0a0d1a; }
  ::-webkit-scrollbar-thumb { background: #1e2240; border-radius: 3px; }

  /* Grid background */
  #grid-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(#1a1f3a18 1px, transparent 1px),
      linear-gradient(90deg, #1a1f3a18 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid #1a1f3a;
    background: rgba(8,11,24,0.9);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
  }
  .logo-wrap { display: flex; align-items: center; gap: 14px; }
  .logo-mark {
    width: 40px; height: 40px;
    background: #00e5a011; border: 1px solid #00e5a033; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-title { font-family: 'Playfair Display', serif; font-size: 20px; color: #e8eaf2; letter-spacing: 0.02em; }
  .logo-sub { font-size: 10px; letter-spacing: 0.2em; color: #3d4260; font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
  nav { display: flex; gap: 6px; align-items: center; }
  .nav-btn {
    padding: 7px 16px; background: transparent; border: 1px solid #1a1f3a;
    border-radius: 6px; color: #5a6080; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; transition: all 0.2s;
  }
  .nav-btn:hover { color: #c8cce8; border-color: #2d3460; }
  .nav-btn.active { background: #0e1228; border-color: #2d3460; color: #c8cce8; }
  .csv-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; background: transparent; border: 1px solid #00e5a033;
    border-radius: 6px; color: #00e5a0; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; transition: all 0.2s;
  }
  .csv-btn:hover { background: #00e5a011; }

  /* Main */
  main { padding: 28px 32px; max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

  /* Views */
  .view { display: none; }
  .view.active { display: block; }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 20px; }
  .stat-card {
    background: #0e1228; border-radius: 10px; padding: 20px 22px;
    position: relative; overflow: hidden;
  }
  .stat-card-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; opacity: 0.6; }
  .stat-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #3d4260; font-family: 'JetBrains Mono', monospace; margin-bottom: 10px; }
  .stat-value { font-size: 22px; margin-bottom: 6px; }
  .stat-sub { font-size: 11px; color: #3d4260; }

  /* Section card */
  .section-card {
    background: #0b0f22; border: 1px solid #1a1f3a;
    border-radius: 12px; padding: 24px 28px; margin-bottom: 20px;
  }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 16px; color: #e8eaf2; letter-spacing: 0.01em; }

  /* Detail grid */
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .detail-item {}
  .detail-item.full { grid-column: 1 / -1; }
  .detail-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #3d4260; font-family: 'JetBrains Mono', monospace; margin-bottom: 4px; }
  .detail-val { font-size: 13px; color: #c8cce8; line-height: 1.6; }
  .detail-val.empty { color: #2d3050; }

  /* Empty state */
  .empty-state { text-align: center; padding: 48px 24px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { color: #5a6080; font-size: 14px; margin-bottom: 16px; }

  /* Chart */
  #chart-container { background: #0b0f22; border: 1px solid #1a1f3a; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px; }
  #chart-label { font-size: 10px; letter-spacing: 0.16em; color: #3d4260; font-family: 'JetBrains Mono', monospace; margin-bottom: 14px; text-transform: uppercase; }
  #pnl-chart { width: 100%; height: 80px; display: block; }

  /* Form */
  .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 24px; }
  .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
  .form-field { margin-bottom: 18px; }
  .form-label { display: block; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #5a6080; margin-bottom: 6px; font-family: 'JetBrains Mono', monospace; }
  .form-input, .form-textarea {
    width: 100%; background: #080b18; border: 1px solid #1a1f3a;
    border-radius: 6px; padding: 10px 14px; color: #c8cce8;
    font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus { border-color: #2d3460; }
  .form-textarea { resize: vertical; min-height: 80px; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.4); }

  /* Buttons */
  .btn-primary {
    padding: 10px 24px; background: #00e5a0; border: none; border-radius: 6px;
    color: #080b18; font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: 'DM Sans', sans-serif; letter-spacing: 0.04em; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.85; }
  .btn-ghost {
    padding: 10px 20px; background: transparent; border: 1px solid #1a1f3a;
    border-radius: 6px; color: #5a6080; font-size: 13px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: #2d3460; color: #8a8fa8; }
  .btn-edit {
    padding: 6px 14px; background: transparent; border: 1px solid #2d3460;
    border-radius: 5px; color: #6a7090; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .btn-edit:hover { border-color: #4d9fff; color: #4d9fff; }
  .btn-delete {
    padding: 6px 14px; background: transparent; border: 1px solid rgba(255,77,109,0.2);
    border-radius: 5px; color: #ff4d6d; font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .btn-delete:hover { background: rgba(255,77,109,0.08); }
  .btn-row { display: flex; gap: 12px; margin-top: 8px; }

  /* History rows */
  .history-list { display: flex; flex-direction: column; gap: 10px; }
  .history-row {
    background: #0e1228; border: 1px solid #1a1f3a;
    border-left: 3px solid; border-radius: 8px; padding: 14px 18px;
    cursor: pointer; transition: background 0.15s;
  }
  .history-row:hover { background: #111530; }
  .history-row-top { display: flex; align-items: center; justify-content: space-between; }
  .history-row-left { display: flex; align-items: center; gap: 20px; }
  .history-row-right { display: flex; align-items: center; gap: 14px; }
  .history-date { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #6a7090; }
  .history-strategy { font-size: 13px; color: #8a8fa8; }
  .history-trades { font-size: 12px; color: #5a6080; }
  .history-chevron { color: #3d4260; font-size: 12px; }
  .history-detail { margin-top: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .history-detail-actions { grid-column: 1/-1; display: flex; gap: 10px; margin-top: 8px; }

  /* PnL colors */
  .pnl-pos { color: #00e5a0; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .pnl-neg { color: #ff4d6d; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .pnl-zero { color: #8a8fa8; font-family: 'JetBrains Mono', monospace; font-weight: 700; }

  /* Win/loss display */
  .wl-display { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 22px; }
  .wl-w { color: #00e5a0; }
  .wl-sep { color: #3d4260; margin: 0 4px; }
  .wl-l { color: #ff4d6d; }

  /* Toast */
  #toast {
    position: fixed; top: 20px; right: 20px; z-index: 100;
    padding: 12px 20px; border-radius: 8px; border: 1px solid;
    font-size: 13px; font-family: 'DM Sans', sans-serif;
    backdrop-filter: blur(12px); display: none;
    transition: opacity 0.3s;
  }
  #toast.success { background: rgba(0,229,160,0.12); border-color: #00e5a0; color: #00e5a0; }
  #toast.error { background: rgba(255,77,109,0.12); border-color: #ff4d6d; color: #ff4d6d; }

  /* Responsive */
  @media (max-width: 768px) {
    header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    main { padding: 16px; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .form-grid-3, .form-grid-2 { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .detail-item.full { grid-column: 1; }
    .history-row-left { gap: 10px; flex-wrap: wrap; }
    .history-detail { grid-template-columns: 1fr; }
    .history-detail-actions { grid-column: 1; }
  }
</style>
</head>
<body>

<div id="grid-bg"></div>

<div id="toast"></div>

<header>
  <div class="logo-wrap">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <polyline points="1,17 6,10 10,13 15,5 21,8" stroke="#00e5a0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="21" cy="8" r="2" fill="#00e5a0"/>
      </svg>
    </div>
    <div>
      <div class="logo-title">TRADE LOG</div>
      <div class="logo-sub">PERSONAL JOURNAL</div>
    </div>
  </div>
  <nav>
    <button class="nav-btn active" onclick="switchView('dashboard')">Overview</button>
    <button class="nav-btn" onclick="switchView('log')">Log Trade</button>
    <button class="nav-btn" onclick="switchView('history')">History</button>
    <button class="csv-btn" onclick="downloadCSV()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v8M4 7l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      CSV
    </button>
  </nav>
</header>

<main>

  <!-- DASHBOARD VIEW -->
  <div id="view-dashboard" class="view active">
    <div class="stat-grid">
      <div class="stat-card" id="card-netpnl">
        <div class="stat-card-bar" id="bar-netpnl"></div>
        <div class="stat-label">Net P&L</div>
        <div class="stat-value" id="val-netpnl">₹0.00</div>
        <div class="stat-sub">All time</div>
      </div>
      <div class="stat-card" style="border:1px solid rgba(77,159,255,0.13)">
        <div class="stat-card-bar" style="background:#4d9fff"></div>
        <div class="stat-label">Total Trades</div>
        <div class="stat-value" id="val-trades" style="color:#c8cce8;font-family:'JetBrains Mono',monospace;font-weight:700">0</div>
        <div class="stat-sub">Cumulative</div>
      </div>
      <div class="stat-card" id="card-today">
        <div class="stat-card-bar" id="bar-today"></div>
        <div class="stat-label">Today's P&L</div>
        <div class="stat-value" id="val-today">₹0.00</div>
        <div class="stat-sub" id="sub-today">No entry today</div>
      </div>
      <div class="stat-card" style="border:1px solid rgba(245,200,66,0.13)">
        <div class="stat-card-bar" style="background:#f5c842"></div>
        <div class="stat-label">Win / Loss Days</div>
        <div class="stat-value">
          <span class="wl-display"><span class="wl-w" id="val-win">0</span><span class="wl-sep">W/</span><span class="wl-l" id="val-loss">0</span><span class="wl-sep">L</span></span>
        </div>
        <div class="stat-sub" id="sub-wl">0 total days</div>
      </div>
    </div>

    <div id="chart-container" style="display:none">
      <div id="chart-label">Cumulative P&L Curve</div>
      <svg id="pnl-chart" viewBox="0 0 900 90" preserveAspectRatio="none">
        <defs>
          <linearGradient id="grd" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" id="grd-stop1" stop-opacity="0.18"/>
            <stop offset="100%" id="grd-stop2" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <polyline id="chart-line" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polygon id="chart-fill" fill="url(#grd)"/>
      </svg>
    </div>

    <div id="today-section" class="section-card" style="display:none">
      <div class="section-header">
        <span class="section-title">Today's Entry</span>
        <button class="btn-edit" onclick="editTodayEntry()">Edit</button>
      </div>
      <div class="detail-grid" id="today-details"></div>
    </div>

    <div id="no-today-section" class="section-card empty-state">
      <div class="empty-icon">📈</div>
      <div class="empty-text">No entry for today yet.</div>
      <button class="btn-primary" onclick="switchView('log')">Log Today's Trade</button>
    </div>
  </div>

  <!-- LOG VIEW -->
  <div id="view-log" class="view">
    <div class="section-card">
      <div class="section-header">
        <span class="section-title" id="log-title">New Trade Log</span>
        <span id="log-date-display" style="font-size:11px;color:#3d4260;font-family:'JetBrains Mono',monospace"></span>
      </div>
      <div class="form-grid-3">
        <div class="form-field">
          <label class="form-label">Date</label>
          <input type="date" id="f-date" class="form-input"/>
        </div>
        <div class="form-field">
          <label class="form-label">No. of Trades</label>
          <input type="number" id="f-trades" class="form-input" placeholder="e.g. 5"/>
        </div>
        <div class="form-field">
          <label class="form-label">Day P&L (₹)</label>
          <input type="number" id="f-pnl" class="form-input" placeholder="e.g. -1500 or 3200"/>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-field">
          <label class="form-label">Strategy Used</label>
          <input type="text" id="f-strategy" class="form-input" placeholder="e.g. Breakout, VWAP Reversion..."/>
        </div>
        <div class="form-field">
          <label class="form-label">Indicators Used</label>
          <input type="text" id="f-indicators" class="form-input" placeholder="e.g. RSI, MACD, EMA 20/50..."/>
        </div>
      </div>
      <div class="form-field">
        <label class="form-label">What I Learned Today</label>
        <textarea id="f-learned" class="form-textarea" placeholder="Key insights, market behaviour, patterns noticed..."></textarea>
      </div>
      <div class="form-field">
        <label class="form-label">What Went Wrong</label>
        <textarea id="f-wrong" class="form-textarea" placeholder="Mistakes, emotional decisions, execution errors..."></textarea>
      </div>
      <div class="form-field">
        <label class="form-label">New Skill / Indicator / Strategy Created</label>
        <textarea id="f-newskill" class="form-textarea" placeholder="Anything new you built, discovered or refined today..."></textarea>
      </div>
      <div class="form-field">
        <label class="form-label">To-Do for Today / Tomorrow</label>
        <textarea id="f-todo" class="form-textarea" placeholder="Watchlist, setups to watch, targets, prep tasks..."></textarea>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="saveEntry()" id="save-btn">Save Entry</button>
        <button class="btn-ghost" onclick="cancelLog()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="view-history" class="view">
    <div class="section-card">
      <div class="section-header">
        <span class="section-title">All Entries</span>
        <span id="history-count" style="font-size:12px;color:#3d4260;font-family:'JetBrains Mono',monospace">0 entries</span>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

</main>

<script>
  const STORAGE_KEY = 'tradelog_entries_v1';
  const GOOGLE_SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbwug8yFKXa4l_KIjXD6JF-vsgYoxrweC9yDo_xyWbEBXz0VrKJSwsfwLYDUp3WplXA/exec';
  let entries = [];
  let editId = null;
  let expandedId = null;
  let currentView = 'dashboard';

  // Load
  function loadEntries() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    } catch(e) { entries = []; }
  }

  function saveEntries() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }

  function formatCurrency(val) {
    const n = parseFloat(val);
    if (isNaN(n)) return '₹0.00';
    return (n < 0 ? '-₹' : '₹') + Math.abs(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function pnlHtml(val) {
    const n = parseFloat(val) || 0;
    const cls = n > 0 ? 'pnl-pos' : n < 0 ? 'pnl-neg' : 'pnl-zero';
    const prefix = n > 0 ? '+' : '';
    return `<span class="${cls}">${prefix}${formatCurrency(n)}</span>`;
  }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type;
    t.style.display = 'block';
    t.style.opacity = '1';
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.style.display = 'none', 300); }, 2800);
  }

  // View switching
  function switchView(v) {
    currentView = v;
    document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
    document.getElementById('view-' + v).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach((btn, i) => {
      const views = ['dashboard', 'log', 'history'];
      btn.classList.toggle('active', views[i] === v);
    });
    if (v === 'dashboard') renderDashboard();
    if (v === 'history') renderHistory();
    if (v === 'log' && !editId) resetForm();
  }

  // Dashboard
  function renderDashboard() {
    const totalPnl = entries.reduce((s, e) => s + (parseFloat(e.dayPnl) || 0), 0);
    const totalTrades = entries.reduce((s, e) => s + (parseInt(e.trades) || 0), 0);
    const today = entries.find(e => e.date === todayStr());
    const winDays = entries.filter(e => parseFloat(e.dayPnl) > 0).length;
    const lossDays = entries.filter(e => parseFloat(e.dayPnl) < 0).length;

    // Net PnL card
    const netColor = totalPnl >= 0 ? '#00e5a0' : '#ff4d6d';
    document.getElementById('card-netpnl').style.border = `1px solid ${totalPnl >= 0 ? 'rgba(0,229,160,0.13)' : 'rgba(255,77,109,0.13)'}`;
    document.getElementById('bar-netpnl').style.background = netColor;
    document.getElementById('val-netpnl').innerHTML = pnlHtml(totalPnl);

    document.getElementById('val-trades').textContent = totalTrades;
    document.getElementById('val-win').textContent = winDays + 'W';
    document.getElementById('val-loss').textContent = lossDays + 'L';
    document.getElementById('sub-wl').textContent = entries.length + ' total days';

    // Today card
    const todayPnl = parseFloat(today?.dayPnl || 0);
    const todayColor = todayPnl >= 0 ? '#00e5a0' : '#ff4d6d';
    document.getElementById('card-today').style.border = `1px solid ${todayPnl >= 0 ? 'rgba(0,229,160,0.13)' : 'rgba(255,77,109,0.13)'}`;
    document.getElementById('bar-today').style.background = todayColor;
    document.getElementById('val-today').innerHTML = pnlHtml(todayPnl);
    document.getElementById('sub-today').textContent = today ? (today.strategy || 'No strategy logged') : 'No entry today';

    // Chart
    if (entries.length > 1) {
      renderChart([...entries].reverse());
      document.getElementById('chart-container').style.display = 'block';
    } else {
      document.getElementById('chart-container').style.display = 'none';
    }

    // Today section
    if (today) {
      document.getElementById('today-section').style.display = 'block';
      document.getElementById('no-today-section').style.display = 'none';
      renderTodayDetails(today);
    } else {
      document.getElementById('today-section').style.display = 'none';
      document.getElementById('no-today-section').style.display = 'block';
    }
  }

  function renderTodayDetails(e) {
    const fields = [
      { label: 'Strategy', val: e.strategy },
      { label: 'Indicators', val: e.indicators },
      { label: 'Trades', val: e.trades },
      { label: 'What I Learned', val: e.learned, full: true },
      { label: 'What Went Wrong', val: e.wentWrong, full: true },
      { label: 'New Skill / Strategy', val: e.newSkill, full: true },
      { label: 'To-Do', val: e.todo, full: true },
    ];
    document.getElementById('today-details').innerHTML = fields.map(f => `
      <div class="detail-item${f.full ? ' full' : ''}">
        <div class="detail-label">${f.label}</div>
        <div class="detail-val${f.val ? '' : ' empty'}">${f.val || '—'}</div>
      </div>
    `).join('');
  }

  function editTodayEntry() {
    const today = entries.find(e => e.date === todayStr());
    if (today) startEdit(today);
  }

  // Chart
  function renderChart(ordered) {
    const vals = ordered.map(e => parseFloat(e.dayPnl) || 0);
    const cumulative = vals.reduce((acc, v, i) => { acc.push((acc[i-1] || 0) + v); return acc; }, []);
    const min = Math.min(...cumulative, 0);
    const max = Math.max(...cumulative, 0);
    const range = max - min || 1;
    const W = 900, H = 90;
    const n = cumulative.length;
    const pts = cumulative.map((v, i) => `${(i/(n-1||1))*W},${H - ((v-min)/range)*H}`).join(' ');
    const color = cumulative[cumulative.length-1] >= 0 ? '#00e5a0' : '#ff4d6d';

    document.getElementById('chart-line').setAttribute('points', pts);
    document.getElementById('chart-line').setAttribute('stroke', color);
    document.getElementById('chart-fill').setAttribute('points', `0,${H} ${pts} ${W},${H}`);
    document.getElementById('grd-stop1').setAttribute('stop-color', color);
    document.getElementById('grd-stop2').setAttribute('stop-color', color);
  }

  // History
  function renderHistory() {
    document.getElementById('history-count').textContent = entries.length + ' entries';
    const list = document.getElementById('history-list');
    if (!entries.length) {
      list.innerHTML = '<div style="text-align:center;padding:40px 0;color:#3d4260">No entries yet. Start logging your trades!</div>';
      return;
    }
    list.innerHTML = entries.map(e => {
      const pnl = parseFloat(e.dayPnl) || 0;
      const borderColor = pnl > 0 ? '#00e5a0' : pnl < 0 ? '#ff4d6d' : '#2d3050';
      const isExpanded = expandedId === e.id;
      const details = isExpanded ? `
        <div class="history-detail" onclick="event.stopPropagation()">
          <div class="detail-item"><div class="detail-label">Indicators</div><div class="detail-val${e.indicators ? '' : ' empty'}">${e.indicators || '—'}</div></div>
          <div class="detail-item"><div class="detail-label">Trades</div><div class="detail-val${e.trades ? '' : ' empty'}">${e.trades || '—'}</div></div>
          <div class="detail-item full"><div class="detail-label">What I Learned</div><div class="detail-val${e.learned ? '' : ' empty'}">${e.learned || '—'}</div></div>
          <div class="detail-item full"><div class="detail-label">What Went Wrong</div><div class="detail-val${e.wentWrong ? '' : ' empty'}">${e.wentWrong || '—'}</div></div>
          <div class="detail-item full"><div class="detail-label">New Skill / Strategy</div><div class="detail-val${e.newSkill ? '' : ' empty'}">${e.newSkill || '—'}</div></div>
          <div class="detail-item full"><div class="detail-label">To-Do</div><div class="detail-val${e.todo ? '' : ' empty'}">${e.todo || '—'}</div></div>
          <div class="history-detail-actions">
            <button class="btn-edit" onclick="startEditById('${e.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteEntry('${e.id}')">Delete</button>
          </div>
        </div>` : '';
      return `
        <div class="history-row" style="border-left-color:${borderColor}" onclick="toggleExpand('${e.id}')">
          <div class="history-row-top">
            <div class="history-row-left">
              <span class="history-date">${e.date}</span>
              <span class="history-strategy">${e.strategy || '—'}</span>
              <span class="history-trades">${e.trades ? e.trades + ' trades' : ''}</span>
            </div>
            <div class="history-row-right">
              ${pnlHtml(e.dayPnl)}
              <span class="history-chevron">${isExpanded ? '▲' : '▼'}</span>
            </div>
          </div>
          ${details}
        </div>`;
    }).join('');
  }

  function toggleExpand(id) {
    expandedId = expandedId === id ? null : id;
    renderHistory();
  }

  // Form
  function resetForm() {
    document.getElementById('f-date').value = todayStr();
    document.getElementById('f-trades').value = '';
    document.getElementById('f-pnl').value = '';
    document.getElementById('f-strategy').value = '';
    document.getElementById('f-indicators').value = '';
    document.getElementById('f-learned').value = '';
    document.getElementById('f-wrong').value = '';
    document.getElementById('f-newskill').value = '';
    document.getElementById('f-todo').value = '';
    document.getElementById('log-title').textContent = 'New Trade Log';
    document.getElementById('save-btn').textContent = 'Save Entry';
    document.getElementById('log-date-display').textContent = todayStr();
    editId = null;
  }

  function startEdit(e) {
    editId = e.id;
    document.getElementById('f-date').value = e.date || '';
    document.getElementById('f-trades').value = e.trades || '';
    document.getElementById('f-pnl').value = e.dayPnl || '';
    document.getElementById('f-strategy').value = e.strategy || '';
    document.getElementById('f-indicators').value = e.indicators || '';
    document.getElementById('f-learned').value = e.learned || '';
    document.getElementById('f-wrong').value = e.wentWrong || '';
    document.getElementById('f-newskill').value = e.newSkill || '';
    document.getElementById('f-todo').value = e.todo || '';
    document.getElementById('log-title').textContent = 'Edit Entry';
    document.getElementById('save-btn').textContent = 'Update Entry';
    document.getElementById('log-date-display').textContent = e.date;
    switchView('log');
  }

  function startEditById(id) {
    const e = entries.find(x => x.id === id);
    if (e) startEdit(e);
  }

  function cancelLog() {
    editId = null;
    resetForm();
    switchView('dashboard');
  }

  function saveEntry() {
    const date = document.getElementById('f-date').value;
    if (!date) return showToast('Date is required', 'error');
    const entry = {
      id: editId || Date.now().toString(),
      date,
      trades: document.getElementById('f-trades').value,
      dayPnl: document.getElementById('f-pnl').value,
      strategy: document.getElementById('f-strategy').value,
      indicators: document.getElementById('f-indicators').value,
      learned: document.getElementById('f-learned').value,
      wentWrong: document.getElementById('f-wrong').value,
      newSkill: document.getElementById('f-newskill').value,
      todo: document.getElementById('f-todo').value,
    };
    if (editId) {
	  entries = entries.map(e => e.id === editId ? entry : e);
	  showToast('Entry updated');
	} else {
	  entries = [entry, ...entries].sort((a, b) => b.date.localeCompare(a.date));
	  showToast('Entry saved successfully');
	}

	saveEntries();

	// Save to Google Sheet
	fetch(GOOGLE_SCRIPT_URL, {
	  method: 'POST',
	  headers: {
		'Content-Type': 'application/json'
	  },
	  body: JSON.stringify(entry)
	})
	.then(response => response.json())
	.then(data => console.log('Saved to Google Sheet'))
	.catch(error => console.error('Google Sheet Error:', error));

	editId = null;
	resetForm();
	switchView('dashboard');
  }

  function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    entries = entries.filter(e => e.id !== id);
    saveEntries();
    expandedId = null;
    showToast('Entry deleted');
    renderHistory();
  }

  // CSV
  function downloadCSV() {
    if (!entries.length) return showToast('No entries to download', 'error');
    const headers = ['Date','Trades','Day P&L (INR)','Strategy','Indicators','Learned','What Went Wrong','New Skill/Strategy','To-Do'];
    const rows = entries.map(e => [e.date, e.trades, e.dayPnl, e.strategy, e.indicators, e.learned, e.wentWrong, e.newSkill, e.todo].map(v => '"' + (v||'').replace(/"/g,'""') + '"'));
    const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'trading_journal_' + todayStr() + '.csv';
    a.click(); URL.revokeObjectURL(url);
    showToast('CSV downloaded');
  }

  // Init
  loadEntries();
  document.getElementById('f-date').value = todayStr();
  document.getElementById('log-date-display').textContent = todayStr();
  renderDashboard();
</script>
</body>
</html>
